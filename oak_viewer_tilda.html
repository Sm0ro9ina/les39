<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дуб черешчатый — 3D просмотрщик</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0d1208;
    color: #e8e4d8;
    min-height: 100vh;
  }

  .oak-viewer {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  .header {
    margin-bottom: 32px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 600;
    color: #d4c89a;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .header .latin {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    color: #7a8c5e;
    letter-spacing: 0.03em;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 24px;
    align-items: start;
  }

  @media (max-width: 680px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* 3D Canvas */
  #canvas-container {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    background: #111a08;
    border: 1px solid #2a3a18;
    height: 500px;
  }

  #canvas-container canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  .canvas-hint {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(180,200,140,0.5);
    pointer-events: none;
    white-space: nowrap;
    letter-spacing: 0.05em;
  }

  .loading-overlay {
    position: absolute;
    inset: 0;
    background: #111a08;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 10;
  }

  .loading-ring {
    width: 40px;
    height: 40px;
    border: 2px solid #2a3a18;
    border-top-color: #7a8c5e;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  .loading-text {
    font-size: 12px;
    color: #7a8c5e;
    letter-spacing: 0.08em;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Sidebar */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .info-block {
    background: #111a08;
    border: 1px solid #2a3a18;
    border-radius: 12px;
    padding: 20px;
  }

  .info-block h2 {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #7a8c5e;
    margin-bottom: 12px;
  }

  .tree-facts {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .fact {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    font-size: 13px;
    border-bottom: 1px solid #1e2c10;
    padding-bottom: 10px;
  }

  .fact:last-child { border-bottom: none; padding-bottom: 0; }

  .fact-label { color: #5a6b42; }
  .fact-value { color: #d4c89a; font-weight: 500; text-align: right; }

  /* Disease buttons */
  .disease-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .dis-btn {
    background: transparent;
    border: 1px solid #2a3a18;
    border-radius: 8px;
    padding: 10px 14px;
    color: #8a9c6e;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.15s;
    line-height: 1.3;
  }

  .dis-btn:hover {
    border-color: #4a6030;
    color: #c8d8a8;
    background: #141f08;
  }

  .dis-btn.active {
    border-color: #c87a50;
    background: #1a100a;
    color: #e8c090;
  }

  .dis-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Disease detail */
  .disease-detail {
    background: #111a08;
    border: 1px solid #2a3a18;
    border-radius: 12px;
    padding: 18px;
    font-size: 13px;
    line-height: 1.7;
    color: #8a9c6e;
    min-height: 100px;
    transition: all 0.2s;
  }

  .disease-detail.has-content {
    border-color: #3a2a18;
    color: #b8c898;
  }

  .disease-detail strong {
    color: #d4c89a;
    font-weight: 500;
    display: block;
    margin-bottom: 6px;
    font-style: italic;
  }

  .zone-badge {
    display: inline-block;
    margin-top: 10px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    background: #1e2c10;
    color: #7a8c5e;
    border: 1px solid #2a3a18;
  }

  /* Error state */
  .error-msg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: #7a8c5e;
    font-size: 13px;
    text-align: center;
    padding: 24px;
    display: none;
  }
</style>
</head>
<body>

<div class="oak-viewer">
  <div class="header">
    <h1>Дуб черешчатый</h1>
    <div class="latin">Quercus robur L.</div>
  </div>

  <div class="layout">
    <div id="canvas-container">
      <canvas id="three-canvas"></canvas>
      <div class="loading-overlay" id="loading">
        <div class="loading-ring"></div>
        <div class="loading-text">Загружаем 3D модель...</div>
      </div>
      <div class="canvas-hint">Вращайте мышью · прокрутка = зум</div>
    </div>

    <div class="sidebar">
      <div class="info-block">
        <h2>Характеристики</h2>
        <div class="tree-facts">
          <div class="fact"><span class="fact-label">Высота</span><span class="fact-value">до 40 м</span></div>
          <div class="fact"><span class="fact-label">Возраст</span><span class="fact-value">500–1000 лет</span></div>
          <div class="fact"><span class="fact-label">Семейство</span><span class="fact-value">Буковые</span></div>
          <div class="fact"><span class="fact-label">Ареал</span><span class="fact-value">Европа, Зап. Азия</span></div>
          <div class="fact"><span class="fact-label">Регион</span><span class="fact-value">Калининградская обл.</span></div>
        </div>
      </div>

      <div class="info-block">
        <h2>Болезни и вредители</h2>
        <div class="disease-list" id="diseaseList"></div>
      </div>

      <div class="disease-detail" id="diseaseDetail">
        Выберите болезнь из списка — на модели подсветится поражённая зона.
      </div>
    </div>
  </div>
</div>

<!-- 
  ИНСТРУКЦИЯ ДЛЯ ТИЛЬДЫ:
  1. Загрузи oak_web.glb на свой хостинг или CDN (Cloudinary, GitHub Release и т.д.)
  2. Замени MODEL_URL ниже на реальный URL файла
  3. Вставь весь этот код в блок T123 (HTML) на Tilda
-->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// =============================================
// ЗАМЕНИ ЭТУ СТРОКУ НА URL СВОЕЙ МОДЕЛИ:
const MODEL_URL = 'oak_web.glb';
// =============================================

const DISEASES = [
  {
    id: 'trutov',
    name: 'Трутовик настоящий',
    dot: '#c87050',
    zone: 'trunk',
    zoneLabel: 'Поражает ствол',
    latin: 'Fomes fomentarius',
    desc: 'Гнилевой гриб — вызывает белую гниль. Плодовые тела в форме копыта появляются на стволе. Споры проникают через морозобоины и раны. Приводит к бурелому.'
  },
  {
    id: 'mildew',
    name: 'Мучнистая роса дуба',
    dot: '#a89040',
    zone: 'crown',
    zoneLabel: 'Поражает крону',
    latin: 'Microsphaera alphitoides',
    desc: 'Белый мучнистый налёт на листьях и молодых побегах. Особенно вредоносна в июне–июле. Снижает прирост, ослабляет дерево. Опрыскивание фунгицидами в мае.'
  },
  {
    id: 'aphid',
    name: 'Дубовая листовая тля',
    dot: '#5a8c40',
    zone: 'crown',
    zoneLabel: 'Поражает крону',
    latin: 'Tuberculatus quercus',
    desc: 'Колонии на нижней стороне листьев, выделяет медвяную росу. Снижает ассимиляцию. Биоконтроль: наездники-паразиты и кокцинеллиды эффективны при умеренной численности.'
  },
  {
    id: 'woodpecker',
    name: 'Дубовый заболонник',
    dot: '#6878a0',
    zone: 'trunk',
    zoneLabel: 'Поражает ствол',
    latin: 'Scolytus intricatus',
    desc: 'Вторичный вредитель ослабленных деревьев. Личинки прокладывают ходы под корой, нарушая сокодвижение. Входные отверстия 1–1,5 мм. Санитарные рубки, феромонные ловушки.'
  },
];

// Цвета зон при подсветке болезни
const ZONE_COLORS = {
  trunk: 0xc87050,
  crown: 0xa89040,
  roots: 0x6878a0,
};

let scene, camera, renderer;
let modelGroup = null;
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0.4, phi: 1.1, r: 6 };
let originalMaterials = new Map();
let currentDisease = null;

function initThree() {
  const wrap = document.getElementById('canvas-container');
  scene = new THREE.Scene();

  // Туман для атмосферы
  scene.fog = new THREE.FogExp2(0x0d1a06, 0.035);

  camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.1, 200);
  updateCamera();

  renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById('three-canvas'),
    antialias: true,
    alpha: false
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  renderer.setClearColor(0x0d1a06);
  renderer.shadowMap.enabled = true;
  renderer.physicallyCorrectLights = true;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;

  // Освещение
  const amb = new THREE.AmbientLight(0x8ab878, 0.6);
  scene.add(amb);

  const sun = new THREE.DirectionalLight(0xfff0d0, 1.8);
  sun.position.set(4, 8, 3);
  sun.castShadow = true;
  scene.add(sun);

  const fill = new THREE.DirectionalLight(0x8090c0, 0.4);
  fill.position.set(-3, 2, -4);
  scene.add(fill);

  // Земля
  const groundGeo = new THREE.CircleGeometry(4, 32);
  const groundMat = new THREE.MeshLambertMaterial({ color: 0x1a2a0a });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Управление
  const c = renderer.domElement;
  c.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
  window.addEventListener('mouseup', () => isDragging = false);
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    spherical.theta -= (e.clientX - prevMouse.x) * 0.005;
    spherical.phi = Math.max(0.3, Math.min(1.5, spherical.phi - (e.clientY - prevMouse.y) * 0.005));
    prevMouse = { x: e.clientX, y: e.clientY };
    updateCamera();
  });
  c.addEventListener('wheel', e => {
    spherical.r = Math.max(2, Math.min(12, spherical.r + e.deltaY * 0.01));
    updateCamera();
    e.preventDefault();
  }, { passive: false });

  c.addEventListener('touchstart', e => { isDragging = true; prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }, { passive: true });
  window.addEventListener('touchend', () => isDragging = false);
  window.addEventListener('touchmove', e => {
    if (!isDragging) return;
    spherical.theta -= (e.touches[0].clientX - prevMouse.x) * 0.005;
    spherical.phi = Math.max(0.3, Math.min(1.5, spherical.phi - (e.touches[0].clientY - prevMouse.y) * 0.005));
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    updateCamera();
  }, { passive: true });

  window.addEventListener('resize', () => {
    const w = wrap.clientWidth, h = wrap.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });

  animate();
  loadModel();
}

function updateCamera() {
  camera.position.x = spherical.r * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.position.y = spherical.r * Math.cos(spherical.phi) + 3;
  camera.position.z = spherical.r * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.lookAt(0, 3, 0);
}

function loadModel() {
  // Динамически загружаем GLTFLoader из Three.js examples
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  script.onload = () => {
    const loader = new THREE.GLTFLoader();
    loader.load(
      MODEL_URL,
      (gltf) => {
        modelGroup = gltf.scene;

        // Центрируем модель
        const box = new THREE.Box3().setFromObject(modelGroup);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 7 / maxDim;
        modelGroup.scale.setScalar(scale);
        modelGroup.position.x = -center.x * scale;
        modelGroup.position.y = -box.min.y * scale;
        modelGroup.position.z = -center.z * scale;

        // Сохраняем оригинальные материалы
        modelGroup.traverse(obj => {
          if (obj.isMesh) {
            originalMaterials.set(obj.uuid, obj.material.clone());
            obj.castShadow = true;
          }
        });

        scene.add(modelGroup);
        document.getElementById('loading').style.display = 'none';
      },
      (progress) => {
        const pct = Math.round(progress.loaded / progress.total * 100);
        document.querySelector('.loading-text').textContent = `Загружаем модель... ${pct}%`;
      },
      (error) => {
        console.error('Ошибка загрузки:', error);
        document.querySelector('.loading-text').textContent = 'Ошибка загрузки модели. Проверьте путь к файлу.';
      }
    );
  };
  document.head.appendChild(script);
}

function highlightZone(zone) {
  if (!modelGroup) return;

  modelGroup.traverse(obj => {
    if (!obj.isMesh) return;
    const orig = originalMaterials.get(obj.uuid);
    if (!orig) return;

    // Определяем принадлежность меша к зоне по имени материала/меша
    const name = (obj.name + (obj.material.name || '')).toLowerCase();
    let inZone = false;

    if (zone === 'trunk') inZone = name.includes('bark') || name.includes('trunk') || name.includes('stem') || name.includes('wood');
    if (zone === 'crown') inZone = name.includes('leaf') || name.includes('leave') || name.includes('foliage') || name.includes('crown');
    if (zone === 'roots') inZone = name.includes('root');

    // Если имя не помогло — определяем по высоте меша
    if (!inZone && zone) {
      const box = new THREE.Box3().setFromObject(obj);
      const center = box.getCenter(new THREE.Vector3());
      const modelBox = new THREE.Box3().setFromObject(modelGroup);
      const relY = (center.y - modelBox.min.y) / (modelBox.max.y - modelBox.min.y);
      if (zone === 'trunk') inZone = relY > 0.1 && relY < 0.6;
      if (zone === 'crown') inZone = relY > 0.55;
      if (zone === 'roots') inZone = relY < 0.15;
    }

    if (inZone && zone) {
      obj.material = orig.clone();
      obj.material.emissive = new THREE.Color(ZONE_COLORS[zone]);
      obj.material.emissiveIntensity = 0.5;
    } else {
      obj.material = orig.clone();
      obj.material.color.multiplyScalar(0.35);
    }
  });
}

function resetHighlight() {
  if (!modelGroup) return;
  modelGroup.traverse(obj => {
    if (!obj.isMesh) return;
    const orig = originalMaterials.get(obj.uuid);
    if (orig) obj.material = orig.clone();
  });
}

function animate() {
  requestAnimationFrame(animate);
  // Лёгкое авто-вращение когда нет взаимодействия
  if (!isDragging && !currentDisease) {
    spherical.theta += 0.0005;
    updateCamera();
  }
  renderer.render(scene, camera);
}

// UI
function renderDiseases() {
  const list = document.getElementById('diseaseList');
  list.innerHTML = '';
  DISEASES.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'dis-btn' + (currentDisease === d.id ? ' active' : '');
    btn.innerHTML = `<span class="dis-dot" style="background:${d.dot}"></span>${d.name}`;
    btn.onclick = () => {
      if (currentDisease === d.id) {
        currentDisease = null;
        resetHighlight();
        const detail = document.getElementById('diseaseDetail');
        detail.innerHTML = 'Выберите болезнь из списка — на модели подсветится поражённая зона.';
        detail.classList.remove('has-content');
      } else {
        currentDisease = d.id;
        highlightZone(d.zone);
        const detail = document.getElementById('diseaseDetail');
        detail.innerHTML = `<strong>${d.latin}</strong>${d.desc}<br><span class="zone-badge">${d.zoneLabel}</span>`;
        detail.classList.add('has-content');
      }
      renderDiseases();
    };
    list.appendChild(btn);
  });
}

initThree();
renderDiseases();
</script>
</body>
</html>
